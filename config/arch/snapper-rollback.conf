# snapper-rollback — Arch Wiki suggested layout
# https://wiki.archlinux.org/title/Snapper#Suggested_filesystem_layout
#
# Usage: sudo snapper-rollback <snapshot_number>
# From live ISO: adjust mountpoint/dev below, mount LUKS first, then run.

[root]
subvol_main = @
subvol_snapshots = @snapshots
mountpoint = /btrfsroot
# Btrfs block device (mapper name or partition). setup-arch fills this on install.
#dev = /dev/mapper/luks_root
