name: smoke-test

# Container smoke tests for the setup-* scripts. Each distro runs in parallel
# inside its base image with every privileged/network command stubbed (see
# tests/), so the scripts execute end to end without touching the host.

on:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same PR to avoid wasting minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: smoke test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [debian, fedora, arch]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need the base commit to diff against

      # Short-circuit: only the docker run is gated, the job itself always
      # reports. Relevant = scripts/, tests/, setup, or workflow files.
      - name: Detect relevant changes
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files="$(git diff --name-only "$base" HEAD)"
          printf 'changed files:\n%s\n' "$files"
          if printf '%s\n' "$files" | grep -qE '^(scripts/|tests/|setup$|\.github/workflows/)'; then
            echo "relevant=true" >>"$GITHUB_OUTPUT"
          else
            echo "relevant=false" >>"$GITHUB_OUTPUT"
            echo "::notice::No script/test/CI changes — skipping docker smoke run."
          fi

      - name: Smoke test
        if: steps.changed.outputs.relevant == 'true'
        run: tests/run.sh smoke ${{ matrix.distro }}
