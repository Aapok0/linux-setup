name: lint

on:
  pull_request:

permissions:
  contents: read

env:
  # Pinned tool versions, kept up to date by Renovate (see renovate.json).
  # renovate: datasource=github-releases depName=koalaman/shellcheck
  SHELLCHECK_VERSION: v0.11.0
  # renovate: datasource=github-releases depName=mvdan/sh
  SHFMT_VERSION: v3.13.1

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install shellcheck
        run: |
          curl -fsSL \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ -C /tmp
          sudo install -m 0755 "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck

      # shellcheck reads .shellcheckrc (external-sources + repo-specific disables).
      - name: Run shellcheck
        run: |
          shellcheck --version
          shellcheck -x \
            setup \
            install \
            scripts/setup-arch \
            scripts/setup-debian \
            scripts/setup-fedora \
            scripts/install-arch \
            scripts/install-arch-backup \
            scripts/install-arch-reinstall \
            scripts/lib/common.sh \
            scripts/lib/install.sh \
            tests/run.sh \
            tests/smoke.sh \
            tests/stub.sh \
            tests/install-smoke.sh \
            config/fedora/snapper/*.sh \
            config/fedora/grub-cryptomount/99_cryptomount_check \
            vars/arch-vars \
            vars/debian-vars \
            vars/fedora-vars

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install shfmt
        run: |
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt

      - name: Check formatting (-i 4 -ci)
        run: |
          /tmp/shfmt --version
          /tmp/shfmt -d -i 4 -ci \
            setup \
            install \
            scripts/lib/common.sh \
            scripts/lib/install.sh \
            scripts/install-arch \
            scripts/install-arch-backup \
            scripts/install-arch-reinstall \
            scripts/setup-arch \
            scripts/setup-debian \
            scripts/setup-fedora \
            tests/run.sh \
            tests/smoke.sh \
            tests/stub.sh \
            tests/install-smoke.sh \
            config/fedora/snapper/*.sh \
            config/fedora/grub-cryptomount/99_cryptomount_check \
            vars/arch-vars \
            vars/debian-vars \
            vars/fedora-vars
